apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: default
spec:
  replicas: 0
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: python:3.11-slim
          env:
            - name: REDIS_HOST
              value: redis
          command:
            - /bin/sh
            - -c
            - |
              pip install redis -q && python -u -c "
import os, redis, random, time
r = redis.Redis(host=os.environ['REDIS_HOST'])
while True:
    msg = r.brpop('keda:queue', timeout=1)
    if msg:
        time.sleep(random.uniform(0.5, 3.0))
        print('processed')
"
